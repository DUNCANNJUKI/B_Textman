name: "CI & Deploy"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max_old_space_size=4096"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          # Prefer pnpm when pnpm-lock.yaml exists, otherwise use npm
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          else
            npm ci
          fi

      - name: Lint
        run: |
          if npm run -s lint; then
            echo "Lint passed"
          else
            echo "Lint failed"; exit 1
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist

      - name: Install Supabase CLI
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}
        run: |
          npm i -g supabase
          supabase --version

      - name: Deploy Supabase migrations
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase login --no-localhost --token "$SUPABASE_ACCESS_TOKEN" || true
          # Deploy migrations - adjust to your migration workflow
          # Available commands depend on your supabase/cli version. Example:
          supabase db push --project-ref "$SUPABASE_PROJECT_REF" || true

      - name: Deploy Supabase functions
        if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase login --no-localhost --token "$SUPABASE_ACCESS_TOKEN" || true
          # Deploy each function found under supabase/functions
          for fn in supabase/functions/*; do
            if [ -d "$fn" ]; then
              name=$(basename "$fn")
              echo "Deploying function: $name"
              supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF" || true
            fi
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./dist
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Optional: push Docker image to registry (requires DOCKERHUB_USERNAME/DOCKERHUB_TOKEN)
      - name: Build and push Docker image (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          docker build -t $DOCKERHUB_USERNAME/bspot-network:latest .
          docker push $DOCKERHUB_USERNAME/bspot-network:latest
