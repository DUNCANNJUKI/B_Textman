name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            npm install -g pnpm
            pnpm install
          else
            npm ci
          fi

      - name: Build
        run: npm run build

      - name: Install Wrangler
        run: npm i -g @cloudflare/wrangler

      - name: Publish to Cloudflare Pages
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PAGES_PROJECT: ${{ secrets.CF_PAGES_PROJECT }}
        run: |
          set -euo pipefail
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_PAGES_PROJECT" ]; then
            echo "CF_API_TOKEN or CF_PAGES_PROJECT not set; skip Pages publish"; exit 1
          fi
          if ! wrangler pages publish dist --project-name "$CF_PAGES_PROJECT" --branch main --commit-hash $GITHUB_SHA; then
            echo "wrangler pages publish failed — printing Wrangler logs for debugging"
            for d in "$HOME/.config/.wrangler" "/root/.config/.wrangler" "/opt/buildhome/.config/.wrangler"; do
              if [ -d "$d/logs" ]; then
                echo "--- Logs in $d/logs ---"
                ls -la "$d/logs" || true
                for f in "$d/logs"/*.log; do
                  echo "--- $f ---"
                  sed -n '1,400p' "$f" || true
                done
              fi
            done
            exit 1
          fi
